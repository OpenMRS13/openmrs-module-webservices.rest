name: OTAP-Pipeline

on:
  push:
    branches:
      - Development
      - main

jobs:
  # --- DEPLOY NAAR TEST ---
  deploy_test:
    if: github.ref == 'refs/heads/Development'
    runs-on: ubuntu-latest
    environment: Testomgeving # <--- GitHub laadt nu automatisch de Test-secrets
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      # Installeer Java 8 (Essentieel voor Maven & Snyk)
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Build project
        run: mvn clean compile

      - name: Snyk SAST (Code Scan)
        uses: snyk/actions/maven@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --sarif-file-output=snyk-sast.sarif
        continue-on-error: true

      - name: Snyk SCA (Dependency Scan)
        uses: snyk/actions/maven@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          # GEFIXT: --file=pom.xml toegevoegd zodat het bestand correct wordt gegenereerd
          args: --file=pom.xml --sarif-file-output=snyk-sca.sarif
        continue-on-error: true

      - name: Generate SBOM
        uses: snyk/actions/maven@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: sbom
          # GEFIXT: Correcte argumenten voor de Snyk Maven SBOM generator
          args: --format=cyclonedx-json --output=sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-test
          path: sbom.json

      - name: Upload SAST Sarif
        uses: github/codeql-action/upload-sarif@v3
        if: always() 
        with:
          sarif_file: snyk-sast.sarif
          category: snyk-code # GEFIXT: Categorie toegevoegd om overschrijven te voorkomen

      - name: Upload SCA Sarif
        uses: github/codeql-action/upload-sarif@v3
        if: always() 
        with:
          sarif_file: snyk-sca.sarif
          category: snyk-sca # GEFIXT: Categorie toegevoegd om overschrijven te voorkomen

      - name: Deploy naar Test server
        run: |
          echo "Deployen naar Test..."

  # --- DEPLOY NAAR PRODUCTIE ---
  deploy_prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: Productieomgeving # <--- GitHub laadt nu automatisch de Productie-secrets
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      # Installeer Java 8 (Essentieel voor Maven & Snyk)
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Build project
        run: mvn clean compile

      - name: Snyk SAST (Code Scan)
        uses: snyk/actions/maven@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --sarif-file-output=snyk-sast.sarif
        continue-on-error: true

      - name: Snyk SCA (Dependency Scan)
        uses: snyk/actions/maven@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          # GEFIXT: --file=pom.xml toegevoegd
          args: --file=pom.xml --sarif-file-output=snyk-sca.sarif
        continue-on-error: true

      - name: Generate SBOM
        uses: snyk/actions/maven@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: sbom
          # GEFIXT: Correcte argumenten voor de Snyk Maven SBOM generator
          args: --format=cyclonedx-json --output=sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-prod
          path: sbom.json

      - name: Upload SAST Sarif
        uses: github/codeql-action/upload-sarif@v3
        if: always() 
        with:
          sarif_file: snyk-sast.sarif
          category: snyk-code

      - name: Upload SCA Sarif
        uses: github/codeql-action/upload-sarif@v3
        if: always() 
        with:
          sarif_file: snyk-sca.sarif
          category: snyk-sca

      # GEFIXT: Snyk Monitor aangepast naar de officiële actie-syntax in plaats van 'run: snyk monitor'
      - name: Snyk Monitor
        uses: snyk/actions/maven@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor

      - name: Deploy naar Productie server
        run: |
          echo "Deployen naar Productie..."