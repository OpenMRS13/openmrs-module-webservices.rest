name: OTAP-Pipeline

on:
  push:
    branches:
      - Development
      - main
      - origin/pipeline-test
  pull_request:
    branches:
      - Development
      - main

# Dit geeft GitHub Actions de rechten om de SARIF-beveiligingsrapporten te uploaden
permissions:
  security-events: write
  contents: read
  actions: read
  pull-requests: write

jobs:
  sast:
    runs-on: ubuntu-latest
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Build with Maven
        run: mvn -B package --no-transfer-progress
        working-directory: openmrs-module-webservices.rest

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  dependency_review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  sbom:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Build project
        run: mvn -B package --no-transfer-progress
        working-directory: openmrs-module-webservices.rest

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          path: openmrs-module-webservices.rest

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cyclonedx.json

  # --- DEPLOY NAAR TEST ---
  deploy_test:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/Development' || github.ref == 'refs/heads/origin/pipeline-test')
    runs-on: ubuntu-latest
    environment: Testomgeving
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      # Installeer Java 8 (Essentieel voor Maven)
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      # Build het project vanuit de juiste map met multi-module support
      - name: Build project
        run: mvn clean package
        working-directory: openmrs-module-webservices.rest

      - name: Deploy naar Test server
        run: |
          echo "Deployen naar Test..."

  # --- DEPLOY NAAR PRODUCTIE ---
  deploy_prod:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: Productieomgeving
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      # Installeer Java 8
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      # Build het project vanuit de juiste map met multi-module support
      - name: Build project
        run: mvn clean package
        working-directory: openmrs-module-webservices.rest

      - name: Deploy naar Productie server
        run: |
          echo "Deployen naar Productie..."