name: OTAP-Pipeline

on:
  push:
    branches:
      - Development
      - main
      - origin/pipeline-test
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - Development
      - main

# Dit geeft GitHub Actions de rechten om de rapporten te uploaden en PR's bij te werken
permissions:
  security-events: write
  contents: read
  actions: read
  pull-requests: write

jobs:
  # SonarCloud Analysis Job
  sonarcloud:
    name: Code Coverage & Quality Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      # We stellen Java 8 in om OpenMRS correct te compileren/testen
      - name: Set up JDK 8 for Building
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      # SonarScanner heeft intern Java 17 nodig om de resultaten te versturen
      - name: Set up JDK 17 for SonarScanner
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      # Cache SonarQube packages
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # Cache Maven packages
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # Voert de tests uit en maakt de rapporten aan
      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn license:format
          mvn -B jacoco:prepare-agent clean verify jacoco:report org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=OpenMRS13_openmrs-module-webservices.rest \
            -Dsonar.coverage.jacoco.xmlReportPaths=**/target/site/jacoco/jacoco.xml \
        working-directory: openmrs-module-webservices.rest

      # HIER IS DE UPLOAD: De ** zorgt dat hij diep in de submappen zoekt naar de rapporten.
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: openmrs-module-webservices.rest/**/target/site/jacoco/

  # Bestaande SAST Job
  sast:
    runs-on: ubuntu-latest
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      # Eerst licenties fixen, dan pas packagen!
      - name: Build with Maven
        run: |
          mvn license:format
          mvn -B package --no-transfer-progress
        working-directory: openmrs-module-webservices.rest

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # Bestaande Dependency Review Job
  dependency_review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  # Bestaande SBOM Job
  sbom:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      # Eerst licenties fixen, dan pas packagen!
      - name: Build project
        run: |
          mvn license:format
          mvn -B package --no-transfer-progress
        working-directory: openmrs-module-webservices.rest

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          path: openmrs-module-webservices.rest

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cyclonedx.json

  # Deploy naar Testomgeving Job
  deploy_test:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/Development' || github.ref == 'refs/heads/origin/pipeline-test')
    runs-on: ubuntu-latest
    environment: Testomgeving
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      # Eerst licenties fixen, dan pas packagen!
      - name: Build project
        run: |
          mvn license:format
          mvn clean package
        working-directory: openmrs-module-webservices.rest

      - name: Deploy naar Test server
        run: |
          echo "Deployen naar Test..."

  # Deploy naar Productieomgeving Job
  deploy_prod:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: Productieomgeving
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      # Eerst licenties fixen, dan pas packagen!
      - name: Build project
        run: |
          mvn license:format
          mvn clean package
        working-directory: openmrs-module-webservices.rest

      - name: Deploy naar Productie server
        run: |
          echo "Deployen naar Productie..."