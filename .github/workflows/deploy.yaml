name: OTAP-Pipeline

on:
  push:
    branches:
      - Development
      - main

jobs:
  # --- DEPLOY NAAR TEST ---
  deploy_test:
    if: github.ref == 'refs/heads/Development'
    runs-on: ubuntu-latest
    environment: Testomgeving
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      # GEFIXT: 'compile' vervangen door 'package -DskipTests' voor multi-module support
      - name: Build project
        run: mvn clean package -DskipTests

      - name: Snyk SAST (Code Scan)
        uses: snyk/actions/maven@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --sarif-file-output=snyk-sast.sarif
        continue-on-error: true

      - name: Snyk SCA (Dependency Scan)
        uses: snyk/actions/maven@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --sarif-file-output=snyk-sca.sarif
        continue-on-error: true

      - name: Generate SBOM
        uses: snyk/actions/maven@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: sbom
          args: --format=cyclonedx-json --output=sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-test
          path: sbom.json

      - name: Upload SAST Sarif
        uses: github/codeql-action/upload-sarif@v3
        if: always() 
        with:
          sarif_file: snyk-sast.sarif
          category: snyk-code

      - name: Upload SCA Sarif
        uses: github/codeql-action/upload-sarif@v3
        if: always() 
        with:
          sarif_file: snyk-sca.sarif
          category: snyk-sca

      - name: Deploy naar Test server
        run: |
          echo "Deployen naar Test..."

  # --- DEPLOY NAAR PRODUCTIE ---
  deploy_prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: Productieomgeving
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      # GEFIXT: 'compile' vervangen door 'package -DskipTests' voor multi-module support
      - name: Build project
        run: mvn clean package -DskipTests

      - name: Snyk SAST (Code Scan)
        uses: snyk/actions/maven@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --sarif-file-output=snyk-sast.sarif
        continue-on-error: true

      - name: Snyk SCA (Dependency Scan)
        uses: snyk/actions/maven@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --sarif-file-output=snyk-sca.sarif
        continue-on-error: true

      - name: Generate SBOM
        uses: snyk/actions/maven@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: sbom
          args: --format=cyclonedx-json --output=sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-prod
          path: sbom.json

      - name: Upload SAST Sarif
        uses: github/codeql-action/upload-sarif@v3
        if: always() 
        with:
          sarif_file: snyk-sast.sarif
          category: snyk-code

      - name: Upload SCA Sarif
        uses: github/codeql-action/upload-sarif@v3
        if: always() 
        with:
          sarif_file: snyk-sca.sarif
          category: snyk-sca

      - name: Snyk Monitor
        uses: snyk/actions/maven@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor

      - name: Deploy naar Productie server
        run: |
          echo "Deployen naar Productie..."