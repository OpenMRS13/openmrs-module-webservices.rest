name: OTAP-Pipeline

on:
  push:
    branches:
      - Development
      - main

# Dit geeft GitHub Actions de rechten om de SARIF-beveiligingsrapporten te uploaden
permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  # --- DEPLOY NAAR TEST ---
  deploy_test:
    if: github.ref == 'refs/heads/Development'
    runs-on: ubuntu-latest
    environment: Testomgeving
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      # Installeer Java 8 (Essentieel voor Maven & Snyk)
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      # Build het project vanuit de juiste map met multi-module support
      - name: Build project
        run: mvn clean package -DskipTests
        working-directory: openmrs-module-webservices.rest

      # Snyk SAST (Code Scan) - Blokkeert alleen bij High/Critical
      - name: Snyk SAST (Code Scan)
        uses: snyk/actions/maven@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --sarif-file-output=snyk-sast.sarif
          target: openmrs-module-webservices.rest
          severity-threshold: high
        continue-on-error: true

      # Snyk SCA (Dependency Scan) - Blokkeert alleen bij High/Critical
      - name: Snyk SCA (Dependency Scan)
        uses: snyk/actions/maven@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --file=pom.xml --sarif-file-output=snyk-sca.sarif
          target: openmrs-module-webservices.rest
          severity-threshold: high
        continue-on-error: true

      # Snyk SBOM genereren
      - name: Generate SBOM
        uses: snyk/actions/maven@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: sbom
          args: --format=cyclonedx-json --output=sbom.json
          target: openmrs-module-webservices.rest

      # Upload het SBOM bestand naar GitHub
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-test
          path: openmrs-module-webservices.rest/sbom.json

      # Upload SAST resultaten naar GitHub Security (Blijft op v3)
      - name: Upload SAST Sarif
        uses: github/codeql-action/upload-sarif@v3
        if: always() 
        with:
          sarif_file: openmrs-module-webservices.rest/snyk-sast.sarif
          category: snyk-code

      # Upload SCA resultaten naar GitHub Security (Blijft op v3)
      - name: Upload SCA Sarif
        uses: github/codeql-action/upload-sarif@v3
        if: always() 
        with:
          sarif_file: openmrs-module-webservices.rest/snyk-sca.sarif
          category: snyk-sca

      - name: Deploy naar Test server
        run: |
          echo "Deployen naar Test..."

  # --- DEPLOY NAAR PRODUCTIE ---
  deploy_prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: Productieomgeving
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      # Installeer Java 8
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      # Build het project vanuit de juiste map met multi-module support
      - name: Build project
        run: mvn clean package -DskipTests
        working-directory: openmrs-module-webservices.rest

      # Snyk SAST (Code Scan) - Productie
      - name: Snyk SAST (Code Scan)
        uses: snyk/actions/maven@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --sarif-file-output=snyk-sast.sarif
          target: openmrs-module-webservices.rest
          severity-threshold: high
        continue-on-error: true

      # Snyk SCA (Dependency Scan) - Productie
      - name: Snyk SCA (Dependency Scan)
        uses: snyk/actions/maven@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --file=pom.xml --sarif-file-output=snyk-sca.sarif
          target: openmrs-module-webservices.rest
          severity-threshold: high
        continue-on-error: true

      # Snyk SBOM genereren - Productie
      - name: Generate SBOM
        uses: snyk/actions/maven@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: sbom
          args: --format=cyclonedx-json --output=sbom.json
          target: openmrs-module-webservices.rest

      # Upload het SBOM bestand naar GitHub - Productie
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-prod
          path: openmrs-module-webservices.rest/sbom.json

      # Upload SAST resultaten naar GitHub Security (Blijft op v3)
      - name: Upload SAST Sarif
        uses: github/codeql-action/upload-sarif@v3
        if: always() 
        with:
          sarif_file: openmrs-module-webservices.rest/snyk-sast.sarif
          category: snyk-code

      # Upload SCA resultaten naar GitHub Security (Blijft op v3)
      - name: Upload SCA Sarif
        uses: github/codeql-action/upload-sarif@v3
        if: always() 
        with:
          sarif_file: openmrs-module-webservices.rest/snyk-sca.sarif
          category: snyk-sca

      # Snyk Monitor voor productie-dashboard
      - name: Snyk Monitor
        uses: snyk/actions/maven@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor
          target: openmrs-module-webservices.rest

      - name: Deploy naar Productie server
        run: |
          echo "Deployen naar Productie..."