name: OTAP-Pipeline

on:
  push:
    branches:
      - Development
      - main

jobs:
  # --- DEPLOY NAAR TEST ---
  deploy_test:
    if: github.ref == 'refs/heads/Development'
    runs-on: ubuntu-latest
    environment: Testomgeving # <--- GitHub laadt nu automatisch de Test-secrets
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      # Installeer Java 8 (Essentieel voor Maven & Snyk)
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      # Build het project vanuit de juiste map
      - name: Build project
        run: mvn clean package -DskipTests
        working-directory: openmrs-module-webservices.rest

      # Snyk SAST gericht op de juiste map
      - name: Snyk SAST (Code Scan)
        uses: snyk/actions/maven@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --sarif-file-output=snyk-sast.sarif
          target: openmrs-module-webservices.rest
        continue-on-error: true

      # Snyk SCA gericht op de juiste map
      - name: Snyk SCA (Dependency Scan)
        uses: snyk/actions/maven@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --file=pom.xml --sarif-file-output=snyk-sca.sarif
          target: openmrs-module-webservices.rest
        continue-on-error: true

      # Snyk SBOM genereren in de juiste map
      - name: Generate SBOM
        uses: snyk/actions/maven@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: sbom
          args: --format=cyclonedx-json --output=sbom.json
          target: openmrs-module-webservices.rest

      # Haal de SBOM op uit de juiste submap
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-test
          path: openmrs-module-webservices.rest/sbom.json

      # Postbodes zoeken de SARIF-bestanden nu in de submap op
      - name: Upload SAST Sarif
        uses: github/codeql-action/upload-sarif@v3
        if: always() 
        with:
          sarif_file: openmrs-module-webservices.rest/snyk-sast.sarif
          category: snyk-code

      - name: Upload SCA Sarif
        uses: github/codeql-action/upload-sarif@v3
        if: always() 
        with:
          sarif_file: openmrs-module-webservices.rest/snyk-sca.sarif
          category: snyk-sca

      - name: Deploy naar Test server
        run: |
          echo "Deployen naar Test..."

  # --- DEPLOY NAAR PRODUCTIE ---
  deploy_prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: Productieomgeving # <--- GitHub laadt nu automatisch de Productie-secrets
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      # Installeer Java 8
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      # Build het project vanuit de juiste map
      - name: Build project
        run: mvn clean package -DskipTests
        working-directory: openmrs-module-webservices.rest

      # Snyk SAST gericht op de juiste map
      - name: Snyk SAST (Code Scan)
        uses: snyk/actions/maven@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --sarif-file-output=snyk-sast.sarif
          target: openmrs-module-webservices.rest
        continue-on-error: true

      # Snyk SCA gericht op de juiste map
      - name: Snyk SCA (Dependency Scan)
        uses: snyk/actions/maven@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --file=pom.xml --sarif-file-output=snyk-sca.sarif
          target: openmrs-module-webservices.rest
        continue-on-error: true

      # Snyk SBOM genereren in de juiste map
      - name: Generate SBOM
        uses: snyk/actions/maven@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: sbom
          args: --format=cyclonedx-json --output=sbom.json
          target: openmrs-module-webservices.rest

      # Haal de SBOM op uit de juiste submap
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-prod
          path: openmrs-module-webservices.rest/sbom.json

      # Postbodes zoeken de SARIF-bestanden nu in de submap op
      - name: Upload SAST Sarif
        uses: github/codeql-action/upload-sarif@v3
        if: always() 
        with:
          sarif_file: openmrs-module-webservices.rest/snyk-sast.sarif
          category: snyk-code

      - name: Upload SCA Sarif
        uses: github/codeql-action/upload-sarif@v3
        if: always() 
        with:
          sarif_file: openmrs-module-webservices.rest/snyk-sca.sarif
          category: snyk-sca

      # Snyk Monitor gericht op de juiste map
      - name: Snyk Monitor
        uses: snyk/actions/maven@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor
          target: openmrs-module-webservices.rest

      - name: Deploy naar Productie server
        run: |
          echo "Deployen naar Productie..."