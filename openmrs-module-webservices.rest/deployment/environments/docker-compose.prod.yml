services:
  openmrs:
    image: openmrs/openmrs-reference-application-distro:latest
    ports:
      - "80:8080"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${OPENMRS_DB_NAME}
      DB_USERNAME: ${OPENMRS_DB_USER}
      DB_PASSWORD: ${OPENMRS_DB_PASSWORD}
    depends_on:
      - db
    volumes:
      - openmrs-prod-data:/openmrs/data
    restart: always

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${OPENMRS_DB_PASSWORD}
      MYSQL_DATABASE: ${OPENMRS_DB_NAME}
      MYSQL_USER: ${OPENMRS_DB_USER}
      MYSQL_PASSWORD: ${OPENMRS_DB_PASSWORD}
    volumes:
      - mysql-prod-data:/var/lib/mysql
    restart: always

volumes:
  openmrs-prod-data:
  mysql-prod-data: